 {% extends 'base.html' %} {%block title %} Apostolic Church {% endblock title%}
<!--  -->

{% block main %}
<div class="container">
    <div class="page-inner">
        <h2>Register New Member</h2>

        <form action="" method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="row">
                <div class="col-md-6 mt-3">
                    <label>FullName:</label>
                    <input type="text" name="full_name" class='form-control form-control-lg' required>
                </div>
                <div class="col-md-6 mt-3">
                    <label>Gender:</label>
                    <select name="gender" id="" class="form-control form-control-lg">
                        <option value="">Select Gender</option>
                        <option value="male">Male</option>
                        <option value="female">Females</option>

                    </select>
                </div>
                <div class="col-md-6 mt-3">
                    <label>Date of Birth:</label>
                    <input type="date" name="dob" class='form-control form-control-lg' required>
                </div>
                <div class="col-md-6 mt-3">
                    <label>Phone Number:</label>
                    <input type="text" name="phone_number" class='form-control form-control-lg' required>
                </div>
                <div class="col-md-6 mt-3">
                    <label>Email:</label>
                    <input type="email" name="email" class='form-control form-control-lg' required>
                </div>

                <div class="col-md-6 mt-3">
                    <label>Location:</label>
                    <input type="text" name="location" class='form-control form-control-lg' required>
                </div>
                <div class="col-md-6 mt-3">
                    <label>Picture:</label>
                    <input type="file" accept="image/*" name="picture" class='form-control form-control-lg' required>
                </div>
                <div class="col-md-6 mt-3">
                    <label>Baptism Status:</label>
                    <select name="is_baptized" id="" class="form-control form-control-lg">
                        <option value="">Select Status</option>
                        <option value="True">Baptized</option>
                        <option value="False">Not Baptized</option>

                    </select>
                </div>

            </div>



            <br>
            <button type="submit" class="btn btn-primary">Sign Up</button>
        </form>
    </div>
</div>
{% endblock main %}
