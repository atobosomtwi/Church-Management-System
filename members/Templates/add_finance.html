 {% extends 'base.html' %} {%block title %} Apostolic Church {% endblock title%}
<!--  -->

{% block main %}
<div class="container">
    <div class="page-inner">
        <h2>Add Transaction</h2>

        <form action="" method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="row">
                <div class="col-md-3 mt-3">
                    <label>Category:</label>
                    <select name="category" id="" class="form-control form-control-lg">
                        <option value="">Select Category</option>
                        <option value="giving">Giving</option>
                        <option value="tithe">Tithe</option>
                        <option value="donation">Donation</option>
                        <option value="benevolence">Benevolence</option>
                        <option value="Miscellaneous">Miscellaneous</option>
    
                    </select>
                </div>
                <div class="col-md-6 mt-3">
                    <label>Type:</label>
                    <select name="type1" id="" class="form-control form-control-lg">
                        <option value="">Select type</option>
                        <option value="Income">Income</option>
                        <option value="Expense">Expenditure</option>
                        
                    </select>
                </div>
                <div class="col-md-6 mt-3">
                    <label>Purpose:</label>
                    <input type="text" name="purpose" class='form-control form-control-lg' required>
                </div>
                <div class="col-md-6 mt-3">
                    <label>Amount:</label>
                    <input type="number" name="amount" class='form-control form-control-lg' required>
                </div>
                <!-- <div class="col-md-6 mt-3">
                    <label>Date Created:</label>
                    <input type="date" name="date_created" class='form-control form-control-lg' required>
                </div> -->


            </div>



            <br>
            <button type="submit" class="btn btn-primary">Submit</button>
        </form>
    </div>
</div>
{% endblock main %}
