 {% extends 'base.html' %} {%block title %} Apostolic Church {% endblock title%}
<!--  -->

{% block main %}
<div class="container">
    <div class="page-inner">
        <h2>Register New Member</h2>

        <form action="" method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="row">
                <div class="col-md-6 mt-3">
                    <label>FullName:</label>
                    <input type="text" name="full_name" value="{{member.full_name}}" class='form-control form-control-lg' required>
                </div>
                <div class="col-md-6 mt-3">
                    <label>Gender:</label>
                    <select name="gender" id="" class="form-control form-control-lg">
                        <option value="">Select Gender</option>
                        <option value="male">Male</option>
                        <option value="female">Females</option>

                    </select>
                </div>
                <div class="col-md-6 mt-3">
                    <label>Date of Birth:</label>
                    <input type="date" name="dob" value="{{member.dob}}" class='form-control form-control-lg' required>
                </div>
                <div class="col-md-6 mt-3">
                    <label>Phone Number:</label>
                    <input type="text" name="phone_number" value="{{member.phone_number}}" class='form-control form-control-lg' required>
                </div>
                <div class="col-md-6 mt-3">
                    <label>Email:</label>
                    <input type="email" name="email" value="{{member.email}}" class='form-control form-control-lg' required>
                </div>

                <div class="col-md-6 mt-3">
                    <label>Location:</label>
                    <input type="text" name="location" value="{{member.location}}" class='form-control form-control-lg' required>
                </div>
                <div class="col-md-6 mt-3">
                    <label>Picture:</label>
                    <input type="file" accept="image/*" name="picture" class='form-control form-control-lg'>
                </div>
                <div class="col-md-3 mt-3">
                    <label>Baptism Status:</label>
                    <select name="is_baptized" id="" class="form-control form-control-lg">
                        <option value="">Select Status</option>
                        <option value="True" {% if member.is_baptized %} selected {% endif %}>Baptized</option>
                        <option value="False" {% if not member.is_baptized %} selected {% endif %}>Not Baptized</option>

                    </select>
                </div>
                <div class="col-md-3 mt-3">
                    <label>Marital Status:</label>
                    <select name="marital_status" id="" class="form-control form-control-lg">
                        <option value="">Select Status</option>
                        <option value="single"{% if member.marital_status == 'single' %} selected {% endif %}>Single</option>
                        <option value="married" {% if member.marital_status == 'married' %} selected {% endif %}>Married</option>
                        <option value="divorced" {% if member.marital_status == 'divorced' %} selected {% endif %}>Divorced</option>

                    </select>
                </div>

            </div>



            <br>
            <button type="submit" class="btn btn-primary">Save changes</button>
        </form>
    </div>
</div>
{% endblock main %}
